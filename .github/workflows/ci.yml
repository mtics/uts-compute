name: CI

# The repo's first CI. One lane:
#   js — build + the JS/TS test suite (`npm test`).
#
# The vendored ihpc-scheduler/ tree is a reference-only, UNSHIPPED snapshot (T7
# retired its deploy path; it is excluded from the .mcpb bundle and unreferenced
# by mcp-server/src runtime), so its pytest suite is no longer a CI gate. The code
# that actually ships — the internalized progressor
# (mcp-server/src/ops/scheduler/node/progressor.py) — is exercised by the Node
# fork-harness tests (mcp-server/tests/ops/scheduler/progressor-*.test.mjs) inside
# `npm test` on this ubuntu lane, where /proc exists so the /proc-gated pid-reuse
# tests run (they only skip on macOS dev). `npm run test:python` still runs the
# vendored pytest locally for provenance/regression, but is intentionally not wired
# into CI.
on: [push, pull_request]

jobs:
  js:
    runs-on: ubuntu-latest
    # Bound the job. The suite is green and finishes in ~30s; a 30m cap is only a
    # backstop for the flaky runner hang documented on the test step below, so a bad
    # run fails in minutes instead of burning GitHub's default 6h (observed: a single
    # hung `npm test` ran the full ~45m the runner allowed before this cap existed).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      # `node --test` is frequently (and non-deterministically) wedged by node's test
      # runner on this constrained 2-core runner: every test PASSES but the runner
      # never prints its summary or exits, so it runs until killed. We investigated
      # this hard and ruled out the obvious suspects:
      #   * NOT a product bug — the campaign progressor's detached daemon + job hold
      #     no descriptor connected to node (verified via /proc fd dumps); node exits
      #     cleanly with them still alive, in single- and multi-file runs.
      #   * `--test-force-exit` does NOT help (the runner blocks BEFORE "all tests
      #     finished", so force-exit never triggers); capping `--test-concurrency`
      #     did not help either.
      #   * Not reproducible off the constrained runner (fresh single runs are green
      #     locally and in Docker, incl. pinned to 2 CPUs) — it is a timing-dependent
      #     race in node:test's own worker coordination. Observed live: one run hung
      #     3 attempts in a row, then passed clean on the 4th.
      # The correct handling for a confirmed environmental/timing flake is a bounded
      # retry with a per-attempt timeout (a wedged attempt is killed fast and retried)
      # plus a between-attempt cleanup of stray detached test processes + scratch. We
      # build ONCE above and retry only the flaky test invocation. A clean run is
      # ~30-60s here, so the 150s cap kills a hang fast; a rare false-timeout just
      # costs one extra (passing) retry. The glob mirrors the `test` script in
      # package.json (kept in sync deliberately).
      - name: Test (bounded retry — absorbs the node:test runner hang)
        run: |
          node scripts/clean-scratch.mjs && npm run lint
          glob1='mcp-server/tests/**/*.test.mjs'
          glob2='webui/tests/*.test.mjs'
          for attempt in $(seq 1 10); do
            echo "::group::node --test — attempt ${attempt}/10"
            if timeout --kill-after=15s 150s node --test "$glob1" "$glob2"; then
              echo "::endgroup::"
              echo "tests passed on attempt ${attempt}"
              exit 0
            fi
            rc=$?
            echo "::endgroup::"
            echo "attempt ${attempt} failed or hung (exit ${rc}); cleaning strays + scratch, retrying"
            pkill -9 -f progressor.py 2>/dev/null || true
            pkill -9 -x sleep 2>/dev/null || true
            node scripts/clean-scratch.mjs 2>/dev/null || true
          done
          echo "::error::node --test did not pass within 10 attempts"
          exit 1
